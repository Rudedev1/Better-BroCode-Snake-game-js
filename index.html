<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Snake game js</title>
<style>
    html{
        background-color:rgb(255, 166, 103);
    }
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin: 2rem;
    }
    #reset {
        width: 100px;
        height: 50px;
        font-size: 20pt;
        border-radius: 10px;
    }
    #game-container {
        background: #58d2e7;
        margin: 2rem;
        width: 350px;
        height: 350px;
        border: 1px solid #000;
    }
    #score {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: 100px;
        margin: 1rem;
    }
</style>
</head>

<body>
<canvas id="game-container" width="350" height="350"></canvas>
<div id="score">0</div>
<button id="reset">Reset</button>
<script src="snake.js"></script>
</body>
</html>
